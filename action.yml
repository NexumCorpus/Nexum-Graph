#
# Reviewing this file:
# - This is the public GitHub Action entrypoint consumed by external repos.
# - Keep its install/version contract aligned with install.sh, release.yml,
#   and tools/release_tools.py.
# - Output names and behavior changes here are effectively API changes for
#   workflow users, not internal refactors.
#
name: "Nexum Graph Semantic Check"
description: "Install Nexum Graph from GitHub Releases, run nex check, and emit merge-risk artifacts for pull requests."
branding:
  icon: git-merge
  color: blue

inputs:
  version:
    description: "Release version in X.Y.Z or vX.Y.Z form. Defaults to the action tag or local manifest version."
    required: false
  base-ref:
    description: "Base git ref to compare."
    required: false
  head-ref:
    description: "Head git ref to compare."
    required: false
  repo-path:
    description: "Path to the git repository to analyze."
    required: false
    default: "."
  format:
    description: "nex check output format: text, json, insights-json, github, or html."
    required: false
    default: "github"
  gate-mode:
    description: "Merge gate policy: strict, errors-only, or advisory."
    required: false
    default: "strict"
  install-dir:
    description: "Directory where nex and nex-lsp should be installed for this run."
    required: false
  html-report-path:
    description: "Optional path where a visual HTML report should be written."
    required: false
  sarif-report-path:
    description: "Optional path where a SARIF report should be written for code scanning upload."
    required: false

outputs:
  version:
    description: "Resolved Nexum Graph release version used for the run."
    value: ${{ steps.resolve.outputs.version }}
  base-ref:
    description: "Resolved base ref."
    value: ${{ steps.resolve.outputs.base_ref }}
  head-ref:
    description: "Resolved head ref."
    value: ${{ steps.resolve.outputs.head_ref }}
  exit-code:
    description: "Exit code returned by nex check."
    value: ${{ steps.run-check.outputs.exit_code }}
  gate-exit-code:
    description: "Effective gate exit code after applying the configured gate policy."
    value: ${{ steps.run-check.outputs.gate_exit_code }}
  gate-status:
    description: "Effective gate status after applying the configured gate policy."
    value: ${{ steps.run-check.outputs.gate_status }}
  summary-path:
    description: "Path to the requested-format report file generated by nex check."
    value: ${{ steps.run-check.outputs.summary_path }}
  html-report-path:
    description: "Path to the generated HTML report file."
    value: ${{ steps.run-check.outputs.html_report_path }}
  sarif-report-path:
    description: "Path to the generated SARIF report file."
    value: ${{ steps.run-check.outputs.sarif_report_path }}
  insights-path:
    description: "Path to the machine-readable insights JSON generated by nex check."
    value: ${{ steps.run-check.outputs.insights_path }}
  risk-score:
    description: "Derived merge-risk score from the semantic check."
    value: ${{ steps.run-check.outputs.risk_score }}
  risk-label:
    description: "Derived merge-risk label from the semantic check."
    value: ${{ steps.run-check.outputs.risk_label }}
  blocking-conflicts:
    description: "Blocking semantic conflict count."
    value: ${{ steps.run-check.outputs.blocking_conflicts }}
  warning-conflicts:
    description: "Warning-level semantic conflict count."
    value: ${{ steps.run-check.outputs.warning_conflicts }}

runs:
  using: "composite"
  steps:
    - id: resolve
      shell: bash
      run: |
        set -euo pipefail

        version="${{ inputs.version }}"
        if [ -z "$version" ]; then
          action_ref="${{ github.action_ref }}"
          if printf '%s' "$action_ref" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            version="$action_ref"
          else
            manifest="${{ github.action_path }}/crates/nex-cli/Cargo.toml"
            version=$(sed -nE 's/^version = "([0-9]+\.[0-9]+\.[0-9]+)"$/\1/p' "$manifest" | head -n 1)
          fi
        fi

        version=$(printf '%s' "$version" | sed -E 's/^v//')
        if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "error: unable to resolve a Nexum Graph release version; pass inputs.version or pin the action to vX.Y.Z" >&2
          exit 1
        fi

        base_ref="${{ inputs.base-ref }}"
        if [ -z "$base_ref" ]; then
          base_ref="${{ github.event.pull_request.base.sha }}"
        fi

        head_ref="${{ inputs.head-ref }}"
        if [ -z "$head_ref" ]; then
          head_ref="${{ github.event.pull_request.head.sha }}"
        fi

        if [ -z "$base_ref" ] || [ -z "$head_ref" ]; then
          echo "error: could not resolve base/head refs automatically; pass inputs.base-ref and inputs.head-ref" >&2
          exit 1
        fi

        install_dir="${{ inputs.install-dir }}"
        if [ -z "$install_dir" ]; then
          install_dir="$RUNNER_TEMP/nexum-graph/bin"
        fi

        {
          printf 'version=v%s\n' "$version"
          printf 'base_ref=%s\n' "$base_ref"
          printf 'head_ref=%s\n' "$head_ref"
          printf 'install_dir=%s\n' "$install_dir"
        } >> "$GITHUB_OUTPUT"

    - name: Install Nexum Graph
      shell: bash
      run: |
        set -euo pipefail
        bash "${{ github.action_path }}/install.sh" \
          --version "${{ steps.resolve.outputs.version }}" \
          --install-dir "${{ steps.resolve.outputs.install_dir }}" \
          --force

    - id: run-check
      shell: bash
      run: |
        set -euo pipefail

        repo_path="${{ inputs.repo-path }}"
        base_ref="${{ steps.resolve.outputs.base_ref }}"
        head_ref="${{ steps.resolve.outputs.head_ref }}"
        format="${{ inputs.format }}"
        gate_mode="${{ inputs.gate-mode }}"
        nex_bin="${{ steps.resolve.outputs.install_dir }}/nex"
        case "$gate_mode" in
          strict|errors-only|advisory) ;;
          *)
            echo "error: unsupported gate-mode '$gate_mode' (expected strict, errors-only, or advisory)" >&2
            exit 1
            ;;
        esac
        case "$format" in
          github) summary_ext="md" ;;
          json|insights-json) summary_ext="json" ;;
          html) summary_ext="html" ;;
          *) summary_ext="txt" ;;
        esac
        summary_file="$RUNNER_TEMP/nex-check-report.$summary_ext"
        html_file="${{ inputs.html-report-path }}"
        sarif_file="${{ inputs.sarif-report-path }}"
        insights_file="$RUNNER_TEMP/nex-check-insights.json"
        if [ -z "$html_file" ]; then
          html_file="$RUNNER_TEMP/nex-check-report.html"
        fi
        if [ -z "$sarif_file" ]; then
          sarif_file="$RUNNER_TEMP/nex-check-report.sarif.json"
        fi

        mkdir -p "$(dirname "$summary_file")" "$(dirname "$html_file")" "$(dirname "$sarif_file")" "$(dirname "$insights_file")"

        if ! git -C "$repo_path" rev-parse --verify "${base_ref}^{commit}" >/dev/null 2>&1; then
          echo "error: base ref '$base_ref' is not available locally. Use actions/checkout@v4 with fetch-depth: 0 or fetch the ref explicitly." >&2
          exit 1
        fi

        if ! git -C "$repo_path" rev-parse --verify "${head_ref}^{commit}" >/dev/null 2>&1; then
          echo "error: head ref '$head_ref' is not available locally. Use actions/checkout@v4 with fetch-depth: 0 or fetch the ref explicitly." >&2
          exit 1
        fi

        set +e
        "$nex_bin" check "$base_ref" "$head_ref" --repo-path "$repo_path" --format "$format" > "$summary_file" 2>&1
        summary_status=$?
        if [ "$format" = "html" ]; then
          cp "$summary_file" "$html_file"
          html_status=$summary_status
        else
          "$nex_bin" check "$base_ref" "$head_ref" --repo-path "$repo_path" --format html > "$html_file" 2>&1
          html_status=$?
        fi
        "$nex_bin" check "$base_ref" "$head_ref" --repo-path "$repo_path" --format sarif > "$sarif_file" 2>&1
        sarif_status=$?
        "$nex_bin" check "$base_ref" "$head_ref" --repo-path "$repo_path" --format insights-json > "$insights_file" 2>&1
        insights_status=$?
        set -e

        if [ "$summary_status" -gt 2 ]; then
          status="$summary_status"
        elif [ "$html_status" -gt 2 ]; then
          status="$html_status"
        elif [ "$sarif_status" -gt 2 ]; then
          status="$sarif_status"
        elif [ "$insights_status" -gt 2 ]; then
          status="$insights_status"
        elif [ "$summary_status" -eq 1 ] || [ "$html_status" -eq 1 ]; then
          status=1
        elif [ "$summary_status" -eq 2 ] || [ "$html_status" -eq 2 ]; then
          status=2
        else
          status=0
        fi

        if [ "$status" -gt 2 ]; then
          gate_exit_code="$status"
          gate_status="runtime-error"
        else
          case "$gate_mode" in
            strict)
              gate_exit_code="$status"
              if [ "$status" -eq 1 ]; then
                gate_status="blocked"
              elif [ "$status" -eq 2 ]; then
                gate_status="warning-blocked"
              else
                gate_status="clean"
              fi
              ;;
            errors-only)
              if [ "$status" -eq 1 ]; then
                gate_exit_code=1
                gate_status="blocked"
              elif [ "$status" -eq 2 ]; then
                gate_exit_code=0
                gate_status="advisory-warning"
              else
                gate_exit_code=0
                gate_status="clean"
              fi
              ;;
            advisory)
              gate_exit_code=0
              if [ "$status" -eq 1 ]; then
                gate_status="advisory-error"
              elif [ "$status" -eq 2 ]; then
                gate_status="advisory-warning"
              else
                gate_status="clean"
              fi
              ;;
          esac
        fi

        eval "$(
          python - "$insights_file" <<'PY'
import json
import shlex
import sys

insights_path = sys.argv[1]
with open(insights_path, "r", encoding="utf-8") as handle:
    payload = json.load(handle)

merge_risk = payload["merge_risk"]
print(f"risk_score={merge_risk['score']}")
print(f"risk_label={shlex.quote(merge_risk['label'])}")
print(f"blocking_conflicts={merge_risk['blocking_conflicts']}")
print(f"warning_conflicts={merge_risk['warning_conflicts']}")
PY
        )"

        cat "$summary_file"
        {
          printf 'exit_code=%s\n' "$status"
          printf 'gate_exit_code=%s\n' "$gate_exit_code"
          printf 'gate_status=%s\n' "$gate_status"
          printf 'summary_path=%s\n' "$summary_file"
          printf 'html_report_path=%s\n' "$html_file"
          printf 'sarif_report_path=%s\n' "$sarif_file"
          printf 'insights_path=%s\n' "$insights_file"
          printf 'risk_score=%s\n' "$risk_score"
          printf 'risk_label=%s\n' "$risk_label"
          printf 'blocking_conflicts=%s\n' "$blocking_conflicts"
          printf 'warning_conflicts=%s\n' "$warning_conflicts"
        } >> "$GITHUB_OUTPUT"

        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          printf '## Nexum Graph Semantic Check\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf '**Merge risk:** %s (%s/100)\n\n' "$risk_label" "$risk_score" >> "$GITHUB_STEP_SUMMARY"
          printf '**Gate mode:** %s\n' "$gate_mode" >> "$GITHUB_STEP_SUMMARY"
          printf '**Gate status:** %s\n\n' "$gate_status" >> "$GITHUB_STEP_SUMMARY"
          if [ "$format" = "github" ]; then
            cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$format" = "html" ]; then
            printf 'Visual HTML report written to `%s`.\n\n' "$html_file" >> "$GITHUB_STEP_SUMMARY"
          else
            printf '```text\n' >> "$GITHUB_STEP_SUMMARY"
            cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
            printf '\n```\n' >> "$GITHUB_STEP_SUMMARY"
          fi
          printf '\nHTML artifact path: `%s`\n' "$html_file" >> "$GITHUB_STEP_SUMMARY"
          printf 'SARIF path: `%s`\n' "$sarif_file" >> "$GITHUB_STEP_SUMMARY"
          printf 'Insights JSON path: `%s`\n' "$insights_file" >> "$GITHUB_STEP_SUMMARY"
        fi

        exit "$gate_exit_code"
