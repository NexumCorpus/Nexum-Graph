name: Semantic Check

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  semantic-check:
    name: nex check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build nex CLI
        run: cargo build --locked -p nex-cli --bin nex

      - id: semantic-check
        name: Run semantic conflict check
        shell: bash
        run: |
          set -euo pipefail
          nex_bin="target/debug/nex"
          summary_file="$RUNNER_TEMP/nex-check-report.md"
          html_file="$RUNNER_TEMP/nex-check-report.html"

          set +e
          "$nex_bin" \
            check "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" \
            --repo-path . \
            --format github > "$summary_file" 2>&1
          summary_status=$?
          "$nex_bin" \
            check "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" \
            --repo-path . \
            --format html > "$html_file" 2>&1
          html_status=$?
          set -e

          if [ "$summary_status" -gt 2 ]; then
            status="$summary_status"
          elif [ "$html_status" -gt 2 ]; then
            status="$html_status"
          elif [ "$summary_status" -eq 1 ] || [ "$html_status" -eq 1 ]; then
            status=1
          elif [ "$summary_status" -eq 2 ] || [ "$html_status" -eq 2 ]; then
            status=2
          else
            status=0
          fi

          cat "$summary_file"
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            printf '## Nexum Graph Semantic Check\n\n' >> "$GITHUB_STEP_SUMMARY"
            cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
            printf '\n\nHTML report artifact: `nexum-graph-semantic-report`\n' >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            printf 'summary_path=%s\n' "$summary_file"
            printf 'html_path=%s\n' "$html_file"
            printf 'exit_code=%s\n' "$status"
          } >> "$GITHUB_OUTPUT"

      - name: Upload semantic report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexum-graph-semantic-report
          path: |
            ${{ steps.semantic-check.outputs.summary_path }}
            ${{ steps.semantic-check.outputs.html_path }}
          if-no-files-found: error

      - name: Post sticky PR summary
        if: always()
        uses: actions/github-script@v7
        env:
          SUMMARY_PATH: ${{ steps.semantic-check.outputs.summary_path }}
          ARTIFACT_NAME: nexum-graph-semantic-report
          EXIT_CODE: ${{ steps.semantic-check.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- nexum-graph-semantic-check -->';
            const summaryPath = process.env.SUMMARY_PATH;
            const artifactName = process.env.ARTIFACT_NAME;
            const exitCode = Number(process.env.EXIT_CODE || '0');
            const summary = fs.readFileSync(summaryPath, 'utf8').trim();
            const statusLine =
              exitCode === 0
                ? 'Clean semantic merge'
                : exitCode === 2
                  ? 'Warnings detected'
                  : 'Blocking semantic conflicts detected';
            const body = [
              marker,
              '## Nexum Graph Semantic Check',
              '',
              `**Status:** ${statusLine}`,
              '',
              `Visual HTML report uploaded as workflow artifact: \`${artifactName}\`.`,
              '',
              summary,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail job if semantic conflicts were found
        if: always()
        shell: bash
        run: exit "${{ steps.semantic-check.outputs.exit_code }}"
