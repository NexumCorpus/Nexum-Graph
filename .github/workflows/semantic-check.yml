name: Semantic Check

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  semantic-check:
    uses: ./.github/workflows/reusable-semantic-check.yml
    with:
      format: github
      gate-mode: errors-only
      artifact-name: nexum-graph-semantic-report
      post-pr-comment: true
      upload-sarif: true
